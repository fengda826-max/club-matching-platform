          - generic [ref=e1172]:
            - paragraph [ref=e1283]:
              - text: 关于上面的操作，不知你有没有思考过一个问题，如果我们在让它自动顺序执行命令时，前面的命令执行不成功，而后面的命令又依赖于上一条命令的结果，那么就会造成花了时间，最终却得到一个错误的结果，而且有时候直观的看你还无法判断结果是否正确。那么我们需要能够有选择性的来执行命令，比如上一条命令执行成功才继续下一条，或者不成功又该做出其它什么处理，比如我们使用
              - code [ref=e1284]: which
              - text: 来查找是否安装某个命令，如果找到就执行该命令，否则什么也不做，虽然这个操作没有什么实际意义，但可帮你更好的理解一些概念：
            - generic [ref=e1285]:
              - code [ref=e1286]: which cowsay>/dev/null && cowsay -f head-in ohch~
              - img "copy" [ref=e1288] [cursor=pointer]
            - paragraph [ref=e1289]:
              - text: 你如果没有安装
              - code [ref=e1290]: cowsay
              - text: ，你可以先执行一次上述命令，你会发现什么也没发生，你再安装好之后你再执行一次上述命令，你也会发现一些惊喜。
            - paragraph [ref=e1291]:
              - text: 上面的
              - code [ref=e1292]: "&&"
              - text: 就是用来实现选择性执行的，它表示如果前面的命令执行结果（不是表示终端输出的内容，而是表示命令执行状态的结果）返回 0 则执行后面的，否则不执行，你可以从
              - code [ref=e1293]: $?
              - text: 环境变量获取上一次命令的返回结果：
            - paragraph [ref=e1294]:
              - img "此处输入图片的描述" [ref=e1295]
            - paragraph [ref=e1296]:
              - text: 学习过 C 语言的用户应该知道在 C 语言里面
              - code [ref=e1297]: "&&"
              - text: 表示逻辑与，而且还有一个
              - code [ref=e1298]: "||"
              - text: 表示逻辑或，同样 Shell 也有一个
              - code [ref=e1299]: "||"
              - text: ，它们的区别就在于，shell 中的这两个符号除了也可用于表示逻辑与和或之外，就是可以实现这里的命令执行顺序的简单控制。
              - code [ref=e1300]: "||"
              - text: 在这里就是与
              - code [ref=e1301]: "&&"
              - text: 相反的控制效果，当上一条命令执行结果为
              - code [ref=e1302]: ≠0(\$?≠0)
              - text: 时则执行它后面的命令：
            - generic [ref=e1303]:
              - code [ref=e1304]: which cowsay>/dev/null || echo "cowsay has not been install, please run 'sudo apt-get install cowsay' to install"
              - img "copy" [ref=e1306] [cursor=pointer]
            - paragraph [ref=e1307]:
              - text: 除了上述基本的使用之外，我们还可以结合着
              - code [ref=e1308]: "&&"
              - text: 和
              - code [ref=e1309]: "||"
              - text: 来实现一些操作，比如：
            - generic [ref=e1310]:
              - code [ref=e1311]: which cowsay>/dev/null && echo "exist" || echo "not exist"
              - img "copy" [ref=e1313] [cursor=pointer]
