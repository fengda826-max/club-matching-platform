              - text: 然后经过层层过滤，你会发现确是只输出了执行的命令那一列，不过去重效果好像不明显，仔细看你会发现它确实去重了，只是不那么明显，之所以不明显是因为
              - code [ref=e1451]: uniq
              - text: 命令只能去连续重复的行，不是全文去重，所以要达到预期效果，我们先排序：
            - generic [ref=e1452]:
