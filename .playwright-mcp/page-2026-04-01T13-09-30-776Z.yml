          - generic [ref=e683]:
            - paragraph [ref=e798]: 什么是内建命令，什么是外部命令呢？这和帮助命令又有什么关系呢？
            - paragraph [ref=e799]: 因为有一些查看帮助的工具在内建命令与外建命令上是有区别对待的。
            - blockquote [ref=e800]:
              - paragraph [ref=e801]:
                - strong [ref=e802]: 内建命令
                - text: 实际上是 shell 程序的一部分，其中包含的是一些比较简单的 Linux 系统命令，这些命令是写在 bash 源码的 builtins 里面的，由 shell 程序识别并在 shell 程序内部完成运行，通常在 Linux 系统加载运行时 shell 就被加载并驻留在系统内存中。而且解析内部命令 shell 不需要创建子进程，因此其执行速度比外部命令快。比如：history、cd、exit 等等。
            - blockquote [ref=e803]:
              - paragraph [ref=e804]:
                - strong [ref=e805]: 外部命令
                - text: 是 Linux 系统中的实用程序部分，因为实用程序的功能通常都比较强大，所以其包含的程序量也会很大，在系统加载时并不随系统一起被加载到内存中，而是在需要时才将其调入内存。虽然其不包含在 shell 中，但是其命令执行过程是由 shell 程序控制的。外部命令是在 Bash 之外额外安装的，通常放在/bin，/usr/bin，/sbin，/usr/sbin 等等。比如：ls、vi 等。
            - paragraph [ref=e806]: 简单来说就是：一个是天生自带的天赋技能，一个是后天得来的附加技能。我们可以使用 type 命令来区分命令是内建的还是外部的。例如这两个得出的结果是不同的
